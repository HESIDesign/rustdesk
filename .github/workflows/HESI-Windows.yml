name: HESI Build Windows 64-bit RustDesk

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version of the workflow to use'
        required: true
        default: 'c626c2414d7a51b7e628555996d48983fa8d6607'

jobs:
  generate-bridge:
    uses: rustdesk/rustdesk/.github/workflows/flutter-build.yml@${{ inputs.version }}#jobs.generate-bridge

  build-RustDeskTempTopMostWindow:
    uses: rustdesk/rustdesk/.github/workflows/flutter-build.yml@${{ inputs.version }}#jobs.build-RustDeskTempTopMostWindow
    with:
      upload-artifact: ${{ inputs.upload-artifact }}
      target: windows-2022
      configuration: Release
      platform: x64
      target_version: Windows10

  build-windows:
    uses: rustdesk/rustdesk/.github/workflows/flutter-build.yml@${{ inputs.version }}#jobs.build-for-windows-flutter
    needs: [generate-bridge, build-RustDeskTempTopMostWindow]
    with:
      upload-artifact: ${{ inputs.upload-artifact }}
      upload-tag: ${{ inputs.upload-tag }}
