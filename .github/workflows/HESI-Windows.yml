name: HESI Build Windows 64-bit RustDesk

on:
  workflow_dispatch:  # 允许手动触发工作流
  push:
    branches:
      - master  # 分支名称设置为 master

jobs:
  generate-bridge:
    name: Generate Bridge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Download and setup bridge
        run: |
          curl -L https://github.com/rustdesk/rustdesk/releases/download/v1.4.0/bridge-setup.sh -o bridge-setup.sh
          chmod +x bridge-setup.sh
          ./bridge-setup.sh

  build-RustDeskTempTopMostWindow:
    name: Build RustDeskTempTopMostWindow
    runs-on: windows-2022
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          choco install -y llvm
          choco install -y cmake

      - name: Build project
        run: |
          cmake -B build
          cmake --build build --config Release

  build-windows:
    name: Build Windows 64-bit
    needs: [generate-bridge, build-RustDeskTempTopMostWindow]
    runs-on: windows-2022
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          choco install -y llvm
          choco install -y cmake

      - name: Build project
        run: |
          cmake -B build
          cmake --build build --config Release
